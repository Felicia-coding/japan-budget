<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本旅遊快速記帳</title>

    <link rel="apple-touch-icon" href="icon.png">

    <meta property="og:image" content="share-icon.png">
    
    <link rel="icon" href="share-icon.png">
    
    <style>
        /* 基礎樣式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }

        h1 {
            color: #d32f2f; 
            text-align: center;
            margin-bottom: 30px;
        }

        /* 輸入區塊樣式 */
        #input-area {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        /* 輸入區塊分組標題 */
        h3 {
            margin-top: 0; 
            margin-bottom: 15px; 
            color: #444;
            padding-bottom: 5px;
            border-bottom: 1px dashed #ddd;
        }

        /* 輸入框和選單樣式 */
        input[type="text"], select {
            width: calc(100% - 22px);
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 1.2em;
            box-sizing: border-box; 
        }

        /* 按鈕樣式 */
        button:not(#export-btn, .delete-btn) {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50; 
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: bold;
            margin-bottom: 10px;
            margin-top: 10px; 
        }
        
        button:hover:not(#export-btn, .delete-btn) {
            background-color: #45a049;
        }
        
        /* 總金額顯示區 */
        #summary-area {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #ffd400; 
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        #total-jpy {
            font-size: 2.0em; 
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 15px;
            display: block;
        }
        #total-twd {
            font-size: 2.0em; 
            font-weight: bold;
            color: #008080; 
            display: block;
        }
        #summary-area p {
            font-size: 1.1em; 
            margin: 5px 0 0 !important;
            color: #555;
            display: block;
        }
        
        /* 歷史記錄區塊標題 */
        #history-header {
            display: flex;
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* 列表樣式 */
        .expense-list-section h4 {
            margin-top: 25px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            color: #333;
        }
        .twd-in-list {
            font-size: 0.9em;
            color: #008080;
            margin-left: 8px;
            font-style: italic;
        }
        .date-group {
            margin-top: 20px;
            margin-bottom: 10px;
            padding: 8px 10px;
            font-weight: bold;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #jpy-cash-list-container .date-group {
            background-color: #fbe4e4; 
            color: #d32f2f; 
        }
        #jpy-card-list-container .date-group {
            background-color: #fff3e0; 
            color: #ff9800; 
        }
        .card-total-summary {
            padding: 10px;
            background: #e3f2fd; 
            border: 1px solid #bbdefb;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        /* 各卡別總計對齊修正 */
        .card-summary-item {
            display: grid; 
            grid-template-columns: 1fr 100px 100px; 
            gap: 10px; 
            padding: 4px 0;
            border-bottom: 1px dotted #a3a3a3;
            align-items: center;
        }
        .card-summary-item:last-child {
             border-bottom: none;
        }

        .summary-card-name {
            text-align: left; 
        }
        .summary-amount {
            text-align: right; 
            white-space: nowrap; 
        }
        .card-summary-item[style*="font-weight: bold;"] {
            grid-template-columns: 1fr 100px 100px;
        }


        .expense-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .expense-list li {
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
        }
        .item-description {
            flex-grow: 1;
            padding-right: 10px;
            color: #555;
        }
        .card-name-in-list {
            font-size: 0.8em; 
            color: #888;
            margin-left: 8px; 
            font-style: italic;
        }
        .item-amount {
            font-weight: bold;
            white-space: nowrap; 
            color: #d32f2f;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 1em;
            padding: 0 5px;
            margin-left: 10px;
            width: auto; 
        }
        .delete-btn:hover {
            color: #d32f2f;
        }
        #clear-btn {
            margin-top: 20px;
            background-color: #9e9e9e !important;
        }
        #clear-btn:hover {
            background-color: #757575;
        }
    </style>
</head>
<body>

    <h1>🇯🇵 日本旅遊快速記帳 💸</h1>

    <div id="summary-area">
        <p>日幣總支出合計</p>
        <div id="total-jpy">¥ 0</div>
        <p>台幣總支出合計</p>
        <div id="total-twd">NT$ 0</div>
    </div>

    <div id="input-area">
        
        <h3>📝 日幣/台幣支出</h3>
        
        <input type="text" id="jpy-amount-input" placeholder="日幣金額: 1000 門票" autofocus>
        
        <input type="text" id="twd-card-input" placeholder="台幣金額 (選填): 1080">
        
        <select id="twd-card-select">
            </select>
        
        <button onclick="addExpense()">+ 記錄支出</button>
    </div>

    <div id="history-area">
        <div id="history-header">
            <h2>🧾 支出歷史記錄</h2>
            <button id="export-btn" onclick="exportToCsv()">匯出 Excel</button>
        </div>
        
        <div id="jpy-cash-list-container" class="expense-list-section"></div>
        
        <div id="jpy-card-list-container" class="expense-list-section"></div>

        <button id="clear-btn" onclick="clearAllData()">清空所有記錄</button>
    </div>

    <script>
        const STORAGE_KEY = 'japan_trip'; 
        
        // 1. DOM 元素
        const jpyAmountInput = document.getElementById('jpy-amount-input');
        const twdCardInput = document.getElementById('twd-card-input');
        const twdCardSelect = document.getElementById('twd-card-select');

        // 2. DOM 元素 - 顯示
        const totalJpyDisplay = document.getElementById('total-jpy'); 
        const totalTwdDisplay = document.getElementById('total-twd'); 
        
        const jpyCashListContainer = document.getElementById('jpy-cash-list-container');
        const jpyCardListContainer = document.getElementById('jpy-card-list-container');
        
        let expenses = [];

        // 卡別選項定義 (集中管理)
        const cardOptions = [
            { value: "聯邦吉鶴卡", text: "聯邦吉鶴卡 (20萬円)" },
            { value: "玉山熊本熊卡", text: "玉山熊本熊卡 (10萬円)" },
            { value: "玉山Unicard卡", text: "玉山Unicard卡 (71萬円)" },
            { value: "永豐幣倍卡", text: "永豐幣倍卡 (10萬円)" },
            { value: "國泰CUBE卡", text: "國泰CUBE卡 (大丸天神)" },
        ];
        
        // --- 核心功能：初始化卡別選單 ---
        function initCardSelects() {
            const defaultOption = '<option value="">-- 卡別 / 最佳上限 --</option>';
            const optionsHtml = cardOptions.map(o => `<option value="${o.value}">${o.text}</option>`).join('');
            
            twdCardSelect.innerHTML = defaultOption + optionsHtml;
        }

        // --- 工具函數：格式化日期 / 解析輸入 (保持不變) ---
        function formatDate(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        function getTodayDateString() {
            return formatDate(new Date('2026-04-04'));
        }

        function parseExpenseInput(inputText, currency) {
            const match = inputText.match(/^(\d+[\d\.]*)\s*(.*)/);
            let amount = 0;
            let description = '';

            if (match) {
                amount = parseFloat(match[1]);
                description = match[2] ? match[2].trim() : `${currency}支出`;
            }

            if (isNaN(amount) || amount < 0) {
                return { error: `請輸入有效的${currency}金額！` };
            }
            
            return { amount, description: description.trim() };
        }

        // --- 核心功能：新增支出 (單一函數，包含邏輯判斷) ---
        function addExpense() {
            let amountJPY = 0;
            let amountTWD = 0;
            let description = '';
            let cardUsed = ''; 
            let type = '';
            let success = false;
            
            // --- 新增：深夜自動補正日期邏輯 ---
            let now = new Date();
            // 如果現在是凌晨 0 點到 5 點之間，日期自動減一天（視為昨天的消費）
            if (now.getHours() < 5) {
                now.setDate(now.getDate() - 1);
            }
            const autoDate = formatDate(now); // 使用你原本就有的 formatDate 函數
            // --------------------------------

            const jpyText = jpyAmountInput.value.trim();
            const twdText = twdCardInput.value.trim();
            cardUsed = twdCardSelect.value;
            
            // 判斷邏輯
            if (twdText) {
                // 模式 1: 刷卡 (台幣有值)
                type = 'CARD_JPY';
                
                if (!jpyText || !cardUsed) {
                    return alert('請輸入日幣金額和卡別！');
                }

                const jpyResult = parseExpenseInput(jpyText, '日幣刷卡');
                const twdResult = parseExpenseInput(twdText, '台幣入帳');

                if (jpyResult.error || twdResult.error) {
                    return alert(jpyResult.error || twdResult.error);
                }

                amountJPY = jpyResult.amount;
                amountTWD = twdResult.amount;
                description = jpyResult.description; 
                success = true;
                
            } else if (jpyText) {
                // 模式 2: 現金 (台幣無值，日幣有值)
                type = 'CASH_JPY';
                
                const result = parseExpenseInput(jpyText, '日幣現金');
                if (result.error) return alert(result.error);
                
                amountJPY = result.amount;
                description = result.description;
                cardUsed = '日幣現金'; // 自動填入
                amountTWD = 0;
                success = true;
                
            } else {
                // 模式 3: 都沒輸入
                return alert('請至少輸入日幣金額 (含描述)！');
            }

            if (success) {
                const newExpense = {
                    id: Date.now(),
                    jpy_amount: amountJPY,
                    twd_amount: amountTWD,
                    description: description, 
                    date: autoDate, // 這裡改成使用上面計算出的 autoDate
                    card_used: cardUsed,
                    type: type 
                };
                expenses.unshift(newExpense);
                
                // 清空欄位
                jpyAmountInput.value = ''; 
                twdCardInput.value = '';
                twdCardSelect.value = '';
                
                saveAndRefresh();
                jpyAmountInput.focus(); 
            }
        }

        // --- 其他函數 (保留不變) ---
        
        function deleteExpense(id) {
            expenses = expenses.filter(expense => expense.id !== id);
            saveAndRefresh();
        }

        function clearAllData() {
            if (confirm('確定要清空所有記帳記錄嗎？這個操作無法復原。')) {
                expenses = [];
                saveAndRefresh();
            }
        }
        
        function calculateTotal() {
            const totalJpy = expenses.reduce((sum, expense) => sum + expense.jpy_amount, 0);
            // 只有刷卡模式的 TWD 才會計入總台幣
            const totalTwd = expenses.reduce((sum, expense) => sum + expense.twd_amount, 0); 

            totalJpyDisplay.textContent = '¥ ' + totalJpy.toLocaleString('ja-JP', { maximumFractionDigits: 0 });
            totalTwdDisplay.textContent = 'NT$ ' + totalTwd.toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }
        
        function calculateCardTotals() {
            const cardExpenses = expenses.filter(e => e.type === 'CARD_JPY');
            
            return cardExpenses.reduce((totals, expense) => {
                const card = expense.card_used || '未知卡別';
                if (!totals[card]) {
                    totals[card] = { jpy: 0, twd: 0 };
                }
                totals[card].jpy += expense.jpy_amount || 0;
                totals[card].twd += expense.twd_amount || 0;
                return totals;
            }, {});
        }

        // *** 修正後的匯出函數：已移除「類型」欄位 ***
        function exportToCsv() {
             if (expenses.length === 0) {
                alert('沒有任何支出記錄可以匯出！');
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            
            // 1. 匯出支出記錄清單 (明細)
            csvContent += "日期,說明,日幣金額(¥),台幣金額(NT$),付款卡別\n"; 

            expenses.forEach(expense => {
                const descriptionSafe = expense.description.replace(/,/g, ';'); 
                const jpy = expense.jpy_amount.toFixed(0); 
                const twd = expense.twd_amount.toFixed(0); 
                const card = expense.card_used || ''; 
                
                csvContent += `${expense.date},${descriptionSafe},${jpy},${twd},${card}\n`; 
            });

            // 2. 新增卡別總計區塊 (JPY + TWD)
            const cardTotals = calculateCardTotals();
            const totalTwdForCard = expenses.filter(e => e.type === 'CARD_JPY').reduce((sum, expense) => sum + expense.twd_amount, 0);
            const totalJpyForCard = expenses.filter(e => e.type === 'CARD_JPY').reduce((sum, expense) => sum + expense.jpy_amount, 0);


            csvContent += "\n\n"; 
            csvContent += "日幣刷卡總結\n"; 
            csvContent += "卡別,日幣總金額(¥),台幣總金額(NT$)\n";
            
            Object.keys(cardTotals).sort().forEach(card => {
                const jpyAmount = cardTotals[card].jpy.toFixed(0);
                const twdAmount = cardTotals[card].twd.toFixed(0);
                csvContent += `${card},${jpyAmount},${twdAmount}\n`;
            });

            csvContent += `總計,${totalJpyForCard.toFixed(0)},${totalTwdForCard.toFixed(0)}\n`;


            // 3. 執行下載
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            
            const filename = `japan_budget_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '-')}.csv`;
            link.setAttribute("download", filename);
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // *** 修正後的渲染函數：增加對齊用的 class ***
        function renderCardTotalsSummary(cardTotals) {
            let html = '<div class="card-total-summary"><strong>各卡別總計</strong><br>';
            
            const totalJpyForCard = Object.values(cardTotals).reduce((sum, item) => sum + item.jpy, 0);
            const totalTwdForCard = Object.values(cardTotals).reduce((sum, item) => sum + item.twd, 0);

            // 顯示每張卡的 JPY 和 TWD 總額
            Object.keys(cardTotals).sort().forEach(card => {
                const totals = cardTotals[card];
                const jpyFormatted = totals.jpy.toLocaleString('ja-JP', { maximumFractionDigits: 0 });
                const twdFormatted = totals.twd.toLocaleString('zh-TW', { maximumFractionDigits: 0 });

                html += `
                    <div class="card-summary-item">
                        <span class="summary-card-name">${card}:</span>
                        <span class="summary-amount" style="color: #d32f2f;">¥ ${jpyFormatted}</span>
                        <span class="summary-amount" style="color: #008080;">NT$ ${twdFormatted}</span>
                    </div>
                `;
            });
            
            // 顯示刷卡總計
            html += `
                <div class="card-summary-item" style="font-weight: bold; margin-top: 5px; border-top: 2px solid #bbdefb; padding-top: 5px;">
                    <span class="summary-card-name">刷卡總支出:</span>
                    <span class="summary-amount" style="color: #d32f2f;">¥ ${totalJpyForCard.toLocaleString('ja-JP', { maximumFractionDigits: 0 })}</span>
                    <span class="summary-amount" style="color: #008080;">NT$ ${totalTwdForCard.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</span>
                </div>
            `;
            
            html += '</div>';
            return html;
        }

        function renderExpenses() {
            jpyCashListContainer.innerHTML = '';
            jpyCardListContainer.innerHTML = '';

            if (expenses.length === 0) {
                jpyCashListContainer.innerHTML = '<h4>💵 日幣現金支出 (¥)</h4><p style="text-align: center; color: #999;">目前沒有記錄。</p>';
                jpyCardListContainer.innerHTML = '<h4>💳 日幣刷卡支出 (¥/NT$)</h4><p style="text-align: center; color: #999;">目前沒有記錄。</p>';
                return;
            }

            const jpyCashList = expenses.filter(e => e.type === 'CASH_JPY');
            const jpyCardList = expenses.filter(e => e.type === 'CARD_JPY');
            
            jpyCashListContainer.innerHTML += `<h4>💵 日幣現金支出 (¥)</h4>`;
            renderList(jpyCashListContainer, jpyCashList, 'CASH_JPY');

            jpyCardListContainer.innerHTML += `<h4>💳 日幣刷卡支出 (¥/NT$)</h4>`;
            
            if (jpyCardList.length > 0) {
                jpyCardListContainer.innerHTML += renderCardTotalsSummary(calculateCardTotals());
            }
            
            renderList(jpyCardListContainer, jpyCardList, 'CARD_JPY');
            
        }
        
        function renderList(container, list, listType) {
            if (list.length === 0) {
                return;
            }
            
            const currencyLocale = 'ja-JP'; 
            const amountKey = 'jpy_amount'; 

            const groupedExpenses = list.reduce((groups, expense) => {
                const date = expense.date;
                if (!groups[date]) groups[date] = [];
                groups[date].push(expense);
                return groups;
            }, {});

            const sortedDates = Object.keys(groupedExpenses).sort().reverse();
            let htmlContent = '';

            sortedDates.forEach(date => {
                const dailyExpenses = groupedExpenses[date];

                const dailyTotal = dailyExpenses.reduce((sum, expense) => sum + expense[amountKey], 0);
                const dailyTotalFormatted = dailyTotal.toLocaleString(currencyLocale, { maximumFractionDigits: 0 });

                htmlContent += `
                    <div class="date-group">
                        <span>${date}</span> 
                        <span>合計: ¥ ${dailyTotalFormatted}</span>
                    </div>
                `;
                
                htmlContent += `<ul class="expense-list">`;

                dailyExpenses.forEach(expense => {
                    const primaryAmount = expense[amountKey].toLocaleString(currencyLocale, { maximumFractionDigits: 0 });
                    
                    let descriptionHtml = expense.description;
                    let amountDisplay = `¥ ${primaryAmount}`;
                    
                    if (listType === 'CARD_JPY') {
                        const secondaryAmount = expense.twd_amount.toLocaleString('zh-TW', { maximumFractionDigits: 0 });
                        descriptionHtml += ` <span class="twd-in-list"> (NT$ ${secondaryAmount})</span>`;
                        descriptionHtml += ` <span class="card-name-in-list">(${expense.card_used})</span>`;
                    }
                    else if (listType === 'CASH_JPY') {
                        descriptionHtml += ` <span class="card-name-in-list">(現金)</span>`;
                    }


                    htmlContent += `
                        <li>
                            <span class="item-description">${descriptionHtml}</span>
                            <span class="item-amount">${amountDisplay}</span>
                            <button class="delete-btn" onclick="deleteExpense(${expense.id})">x</button>
                        </li>
                    `;
                });

                htmlContent += `</ul>`;
            });
            
            container.innerHTML += htmlContent;
        }

        function saveAndRefresh() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
            renderExpenses();
            calculateTotal();
        }
        
        // --- 初始化 ---
        function init() {
            const storedExpenses = localStorage.getItem(STORAGE_KEY);
            if (storedExpenses) {
                let parsedExpenses = JSON.parse(storedExpenses);
                expenses = parsedExpenses.map(exp => {
                    // 確保舊資料也有 type 欄位，以利判斷
                    if (!exp.type) { 
                         if (exp.twd_amount > 0) {
                            exp.type = 'CARD_JPY';
                         } else {
                            exp.type = 'CASH_JPY';
                         }
                    }
                    exp.card_used = exp.card_used || (exp.type === 'CASH_JPY' ? '日幣現金' : '');
                    return exp;
                });
            }
            
            initCardSelects();
            renderExpenses();
            calculateTotal();
            
            // 綁定所有相關輸入框的 Enter 鍵
            jpyAmountInput.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault(); 
                    if (jpyAmountInput.value.trim() && !twdCardInput.value.trim()) {
                        // 現金模式下，直接記錄
                        addExpense(); 
                    } else {
                        // 刷卡模式下，切換到台幣金額
                        twdCardInput.focus(); 
                    }
                }
            });

            twdCardInput.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault(); 
                    twdCardSelect.focus();
                }
            });

            twdCardSelect.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault(); 
                    addExpense(); // 在卡別選單按 Enter 觸發記錄
                }
            });
        }
        
        window.onload = init; 
    </script>
</body>
</html>
